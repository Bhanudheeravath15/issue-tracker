<div *ngIf="loading" class="loading">Loading issue...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<mat-card *ngIf="issue && !loading" class="issue-card">
  <mat-card-header>
    <mat-card-title>{{ issue.title }}</mat-card-title>
    <mat-card-subtitle>
      <span><strong>Status:</strong> {{ issue.status }}</span> •
      <span><strong>Priority:</strong> {{ issue.priority }}</span>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ issue.description }}</p>
    <p *ngIf="issue.assignee"><strong>Assignee:</strong> {{ issue.assignee }}</p>
    <p *ngIf="issue.createdAt"><strong>Created:</strong> {{ issue.createdAt | date:'medium' }}</p>
    <p *ngIf="issue.updatedAt"><strong>Updated:</strong> {{ issue.updatedAt | date:'medium' }}</p>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="onBack()">Back to List</button>
  </mat-card-actions>
</mat-card>
