<div class="table-container mat-elevation-z8" style="padding: 20px;">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
    <h2>Issues</h2>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">Create Issue</button>
  </div>
  
  <table mat-table [dataSource]="issues" matSort (matSortChange)="onSortChange($event)">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
      <td mat-cell *matCellDef="let issue"> {{issue.title}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
      <td mat-cell *matCellDef="let issue"> {{issue.status}} </td>
    </ng-container>

    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Priority </th>
      <td mat-cell *matCellDef="let issue"> {{issue.priority}} </td>
    </ng-container>

    <ng-container matColumnDef="assignee">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Assignee </th>
      <td mat-cell *matCellDef="let issue"> {{issue.assignee}} </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Created At </th>
      <td mat-cell *matCellDef="let issue"> {{issue.createdAt | date}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let issue"> 
        <button mat-button color="primary" [routerLink]="['/issues', issue.id]">View</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator 
    [length]="paginatedData?.total || 0"
    [pageSize]="pageSize"
    [pageIndex]="page - 1"
    (page)="onPageChange($event.pageIndex + 1)">
  </mat-paginator>
</div>
